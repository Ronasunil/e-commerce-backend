services:
  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        echo "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }" | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  mongo-data:
