                - paragraph [ref=e1682]: The brain isn't one trick. Every retrieval question goes through ~20 deterministic techniques layered together. No single one is magic; the win comes from stacking them so each layer covers what the others miss.
                - generic [ref=e1683]:
                  - code [ref=e1685]: Question │ ├─ INGESTION (every put_page) │ ├─ Recursive markdown chunking (or semantic / LLM-guided) │ ├─ Embedding cache invalidation on edit │ └─ Idempotent imports (content-hash dedup) │ ├─ GRAPH EXTRACTION (auto-link post-hook, zero LLM) │ ├─ Entity-ref regex (markdown links + bare slugs) │ ├─ Code-fence stripping (no false-positive slugs in code blocks) │ ├─ Typed inference cascade (FOUNDED → INVESTED → ADVISES → WORKS_AT) │ ├─ Page-role priors (partner-bio language → invested_in) │ ├─ Within-page dedup (same target collapses to one link) │ ├─ Stale-link reconciliation (edits remove dropped refs) │ └─ Multi-type link constraint (same person can works_at AND advises) │ ├─ SEARCH PIPELINE (every query) │ ├─ Intent classifier (entity / temporal / event / general — auto-routes) │ ├─ Multi-query expansion (Haiku rephrases the question 3 ways) │ ├─ Vector search (HNSW cosine over OpenAI embeddings) │ ├─ Keyword search (Postgres tsvector + websearch_to_tsquery) │ ├─ Source-aware ranking (curated dirs outrank chat/daily swamp at SQL layer) │ ├─ Hard-exclude (test/ archive/ attachments/ .raw/ filtered before retrieval) │ ├─ Reciprocal Rank Fusion (score = sum 1/(60+rank) across both) │ ├─ Cosine re-scoring (re-rank chunks against actual query embedding) │ ├─ Compiled-truth boost (assessments outrank timeline noise) │ ├─ Backlink boost (well-connected entities rank higher) │ └─ Source-aware dedup (one CT chunk per page guaranteed) │ ├─ GRAPH TRAVERSAL (relational queries) │ ├─ Recursive CTE with cycle prevention (visited-array check) │ ├─ Type-filtered edges (--type works_at, attended, etc.) │ ├─ Direction control (in / out / both) │ └─ Depth-capped (≤10 for remote MCP; DoS prevention) │ └─ AGENT WORKFLOW (graph-confident hybrid) ├─ Graph-query first (high-precision typed answers) ├─ Grep fallback when graph returns nothing └─ Graph hits ranked first in top-K (better P@K and R@K)
