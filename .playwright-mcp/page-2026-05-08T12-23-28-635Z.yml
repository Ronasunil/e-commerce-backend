                - generic [ref=e1229]:
                  - code [ref=e1231]: "Signal arrives (meeting, email, tweet, link) -> Signal detector captures ideas + entities (parallel, never blocks) -> Brain-ops: check the brain first (gbrain search, gbrain get) -> Respond with full context -> Write: update brain pages with new information + citations -> Auto-link: typed relationships extracted on every write (zero LLM calls) -> Sync: gbrain indexes changes for next query"
                  - button "Copy" [ref=e1233] [cursor=pointer]:
                    - img [ref=e1234]
                - paragraph [ref=e1237]: Every cycle adds knowledge. The agent enriches a person page after a meeting. Next time that person comes up, the agent already has context. The difference compounds daily.
                - paragraph [ref=e1238]:
                  - text: "The system gets smarter on its own. Entity enrichment auto-escalates: a person mentioned once gets a stub page (Tier 3). After 3 mentions across different sources, they get web + social enrichment (Tier 2). After a meeting or 8+ mentions, full pipeline (Tier 1). The brain learns who matters without being told. Deterministic classifiers improve over time via a fail-improve loop that logs every LLM fallback and generates better regex patterns from the failures."
                  - code [ref=e1239]: gbrain doctor
                  - text: "shows the trajectory: \"intent classifier: 87% deterministic, up from 40% in week 1.\""
