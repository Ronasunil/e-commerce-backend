              - article [ref=e743]:
                - generic [ref=e744]:
                  - heading "GBrain" [level=1] [ref=e745]
                  - 'link "Permalink: GBrain" [ref=e746] [cursor=pointer]':
                    - /url: "#gbrain"
                    - img [ref=e747]
                - paragraph [ref=e749]: Your AI agent is smart but forgetful. GBrain gives it a brain.
                - paragraph [ref=e750]:
                  - text: "Built by the President and CEO of Y Combinator to run his actual AI agents. The production brain powering his OpenClaw and Hermes deployments:"
                  - strong [ref=e751]: 17,888 pages, 4,383 people, 723 companies
                  - text: ", 21 cron jobs running autonomously, built in 12 days. The agent ingests meetings, emails, tweets, voice calls, and original ideas while you sleep. It enriches every person and company it encounters. It fixes its own citations and consolidates memory overnight. You wake up and the brain is smarter than when you went to bed."
                - paragraph [ref=e752]:
                  - text: The brain wires itself. Every page write extracts entity references and creates typed links (
                  - code [ref=e753]: attended
                  - text: ","
                  - code [ref=e754]: works_at
                  - text: ","
                  - code [ref=e755]: invested_in
                  - text: ","
                  - code [ref=e756]: founded
                  - text: ","
                  - code [ref=e757]: advises
                  - text: ") with zero LLM calls. Hybrid search. Self-wiring knowledge graph. Structured timeline. Backlink-boosted ranking. Ask \"who works at Acme AI?\" or \"what did Bob invest in this quarter?\" and get answers vector search alone can't reach. Benchmarked side-by-side against the category: gbrain lands"
                  - strong [ref=e758]: P@5 49.1%, R@5 97.9%
                  - text: on a 240-page Opus-generated rich-prose corpus, beating its own graph-disabled variant by
                  - strong [ref=e759]: +31.4 points P@5
                  - text: and ripgrep-BM25 + vector-only RAG by a similar margin. The graph layer plus v0.12 extract quality together carry the gap. Full BrainBench scorecards + corpus live in the sibling
                  - link "gbrain-evals" [ref=e760] [cursor=pointer]:
                    - /url: https://github.com/garrytan/gbrain-evals
                  - text: repo.
                - paragraph [ref=e761]: GBrain is those patterns, generalized. 34 skills. Install in 30 minutes. Your agent does the work. As Garry's personal agent gets smarter, so does yours.
                - paragraph [ref=e762]:
                  - strong [ref=e763]: "New in v0.25.0 — BrainBench-Real (session capture, contributor opt-in):"
                  - text: with
                  - code [ref=e764]: GBRAIN_CONTRIBUTOR_MODE=1
                  - text: set in your shell, every real
                  - code [ref=e765]: query
                  - text: +
                  - code [ref=e766]: search
                  - text: call through MCP, CLI, or the subagent tool-bridge gets captured (PII-scrubbed) into an
                  - code [ref=e767]: eval_candidates
                  - text: table. Snapshot with
                  - code [ref=e768]: gbrain eval export
                  - text: ", replay against your code change with"
                  - code [ref=e769]: gbrain eval replay
                  - text: ". Three numbers come back: mean Jaccard@k between captured and current retrieved slugs, top-1 stability, and latency Δ."
                  - strong [ref=e770]: Off by default
                  - text: "for production users — no surprise data accumulation. Walkthrough:"
                  - link "docs/eval-bench.md" [ref=e771] [cursor=pointer]:
                    - /url: /garrytan/gbrain/blob/master/docs/eval-bench.md
                  - text: ". NDJSON wire format:"
                  - link "docs/eval-capture.md" [ref=e772] [cursor=pointer]:
                    - /url: /garrytan/gbrain/blob/master/docs/eval-capture.md
                  - text: .
                - paragraph [ref=e773]:
                  - strong [ref=e774]: "New in v0.28.8 — LongMemEval in the box:"
                  - code [ref=e775]: gbrain eval longmemeval <dataset.jsonl>
                  - text: runs the public
                  - link "LongMemEval" [ref=e776] [cursor=pointer]:
                    - /url: https://huggingface.co/datasets/xiaowu0162/longmemeval
