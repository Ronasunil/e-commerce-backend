                - generic [ref=e1786]:
                  - code [ref=e1788]: "SETUP gbrain init [--supabase|--url] Create brain (PGLite default) gbrain migrate --to supabase|pglite Bidirectional engine migration gbrain upgrade Self-update with feature discovery PAGES gbrain get <slug> Read a page (fuzzy slug matching) gbrain put <slug> [< file.md] Write/update (auto-versions) gbrain delete <slug> Delete a page gbrain list [--type T] [--tag T] List with filters SEARCH gbrain search <query> Keyword search (tsvector) gbrain query <question> Hybrid search (vector + keyword + RRF) IMPORT gbrain import <dir> [--no-embed] [--workers N] Import markdown (idempotent) gbrain sync [--repo <path>] [--workers N] Git-to-brain incremental sync (>100-file diffs auto-parallelize 4 workers on Postgres) gbrain export [--dir ./out/] Export to markdown FILES gbrain files list|upload|sync|verify File storage operations EMBEDDINGS gbrain embed [<slug>|--all|--stale] Generate/refresh embeddings LINKS + GRAPH gbrain link|unlink|backlinks Cross-reference management gbrain extract links|timeline|all Batch backfill from existing pages (--source db|fs, --type, --since, --dry-run) gbrain graph-query <slug> Typed traversal (--type T --depth N --direction in|out|both) JOBS (Minions) gbrain jobs submit <name> [--params JSON] [--follow] Submit a background job gbrain jobs list [--status S] [--queue Q] List jobs with filters gbrain jobs get|cancel|retry|delete <id> Manage job lifecycle gbrain jobs prune [--older-than 30d] Clean completed/dead jobs gbrain jobs stats Job health dashboard gbrain jobs smoke One-command health check gbrain jobs work [--queue Q] [--concurrency N] Start worker daemon SKILLS (v0.19) gbrain skillify scaffold <name> Create 5 stub files + idempotent resolver row gbrain skillify check [path] 10-item audit of a skill gbrain skillpack list Print the 25 curated skills in the bundle gbrain skillpack install <name> Copy one skill + its shared conventions into target gbrain skillpack install --all Install the full curated bundle gbrain skillpack diff <name> Per-file diff: bundle vs target workspace gbrain check-resolvable [--strict] Resolver audit (reachability, MECE, DRY, routing, filing, SKILLIFY_STUB). Accepts RESOLVER.md OR AGENTS.md. gbrain routing-eval [--llm] [--json] Intent→skill routing accuracy on fixtures EVAL gbrain eval --qrels <path> Legacy IR-eval (P@k, R@k, MRR, nDCG@k against ground truth) gbrain eval export [--since DUR] Stream captured eval_candidates as NDJSON (BrainBench-Real) gbrain eval prune --older-than DUR Retention cleanup for eval_candidates (requires window) gbrain eval replay --against FILE Replay captured queries vs current build (Jaccard@k, top-1, latency Δ) gbrain eval longmemeval <dataset> Run public LongMemEval against gbrain hybrid retrieval (v0.28.8) [--limit N] [--retrieval-only] [--keyword-only] [--expansion] [--top-k K] [--model M] [--output FILE] ADMIN gbrain doctor [--json] [--fast] Health checks (resolver, skills, DB, embeddings) gbrain doctor --fix [--dry-run] Auto-fix DRY violations (delegate inlined rules to conventions) gbrain doctor --locks List idle-in-tx backends (57014 diagnostic, Postgres only) gbrain stats Brain statistics gbrain serve MCP server (stdio) gbrain serve --http [--port 3131] HTTP MCP server with OAuth 2.1 + admin dashboard [--token-ttl 3600] [--enable-dcr] [--public-url URL] [--log-full-params] gbrain auth create|list|revoke|test Legacy bearer token management gbrain auth register-client <name> Register an OAuth 2.1 client --grant-types client_credentials,authorization_code --scopes \"read write admin\" gbrain auth revoke-client <client_id> Revoke an OAuth 2.1 client (cascade purges active tokens + auth codes via FK CASCADE) # OAuth 2.1 clients can also be registered from the /admin dashboard or # programmatically via oauthProvider.registerClientManual() for host-repo wrappers. gbrain integrations Integration recipe dashboard gbrain sources list|add|remove|... Multi-source brain management (v0.18) v0.28.2: --url <https://...> registers a federated remote git repo; clone is auto-managed under $GBRAIN_HOME/clones/<id>/ and re-cloned on sync if it goes missing. Also exposed via MCP for remote agent setup (whoami + sources_{add,list,remove,status}). gbrain dream [--dry-run] [--phase N] 8-phase maintenance cycle (lint→backlinks→sync→synthesize →extract→patterns→embed→orphans). v0.23 added synthesize + patterns: transcripts → reflections + cross-session themes. gbrain dream --input <file> Ad-hoc transcript synthesis (implies --phase synthesize) gbrain dream --date YYYY-MM-DD Synthesize a single day; --from/--to for backfill ranges gbrain check-backlinks check|fix Back-link enforcement gbrain lint [--fix] LLM artifact detection gbrain repair-jsonb [--dry-run] Repair v0.12.0 double-encoded JSONB (Postgres) gbrain orphans [--json] [--count] Find pages with zero inbound wikilinks gbrain transcribe <audio> Transcribe audio (Groq Whisper) gbrain research init <name> Scaffold a data-research recipe gbrain research list Show available recipes"
